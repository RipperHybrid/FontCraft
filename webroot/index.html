<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FontCraft</title>
    <link rel="stylesheet" href="style.css">
    <script src="icons.js"></script>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <h1>FontCraft</h1>
                <span class="subtitle">Remote Library</span>
            </div>
            <div class="header-right">
                <button type="button" id="themeToggle" class="theme-btn" title="Toggle Theme"></button>
            </div>
        </header>

        <main class="main">
            <div class="build-controls" id="buildControls">
                <div class="queue-status">
                    <span id="emojiStatus" class="status-badge empty">Emoji: None</span>
                    <span id="clearContainer"></span>
                    <span id="fontStatus" class="status-badge empty">Font: None</span>
                </div>
                <button id="flashBtn" class="flash-btn" onclick="window.fontUI.processAndFlash()" disabled>
                    Select items to Flash
                </button>
            </div>

            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('Emoji')">Emojis</button>
                <button class="tab-btn" onclick="switchTab('Fonts')">Fonts</button>
            </div>

            <div id="loader" class="loading-container">
                <div class="spinner"></div>
                <p>Fetching Library...</p>
            </div>

            <div id="gridContainer" class="grid-container"></div>
        </main>

        <footer class="footer">
            <div class="footer-content">
                <div class="powered-by-badge">
                    <span class="badge-text">Powered by AshBorn</span>
                </div>
            </div>
        </footer>
    </div>

    <div id="installModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">Select Version</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-content">
                <div id="downloadProgress" class="download-progress">
                    <div class="progress-bar"></div>
                </div>
                <img id="modalPreview" src="" class="modal-preview-img" onerror="this.style.display='none'">
                <div class="file-list" id="modalFileList"></div>
            </div>
        </div>
    </div>

    <div id="clearSelectionModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Clear Selection</h3>
                <button class="close-modal" onclick="window.fontUI.closeClearModal()">&times;</button>
            </div>
            <div class="modal-content">
                <div class="selection-options">
                    <button class="selection-btn" onclick="window.fontUI.clearQueueItem('Emoji')">Clear Emoji</button>
                    <button class="selection-btn" onclick="window.fontUI.clearQueueItem('Fonts')">Clear Font</button>
                    <button class="selection-btn danger" onclick="window.fontUI.clearQueueItem('Both')">Clear Both</button>
                </div>
            </div>
        </div>
    </div>

    <div id="terminalModal" class="modal-overlay">
        <div class="modal-box terminal-box">
            <div class="modal-header">
                <h3>Installation Output</h3>
                <button class="close-modal" id="termCloseBtn" onclick="window.fontUI.closeTerminal()">&times;</button>
            </div>
            <div class="modal-content terminal-wrapper">
                <pre id="terminalOutput">Waiting for command...</pre>
            </div>
        </div>
    </div>

    <div id="fileSelectorModal" class="modal-overlay">
        <div class="modal-box file-browser-box">
            <div class="modal-header file-selector-header">
                <button id="file-selector-back" class="file-nav-btn" title="Go Up"></button>
                <div id="file-selector-path" class="current-path">
                </div>
                <button id="file-selector-close" class="close-modal" onclick="window.fontUI.closeCustomFilePicker()">&times;</button>
            </div>
            <div class="modal-content" id="file-selector-list-wrapper">
                <div id="file-selector-list" class="file-list">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

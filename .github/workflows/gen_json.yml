name: Update Emojis and Fonts  

on:  
  push:  
    branches:  
      - Master  
    paths-ignore:  
      - "fonts.json"  
      - "Preview.md"  
  workflow_dispatch:  

permissions:  
  contents: write  

jobs:  
  update-json:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout Repository  
        uses: actions/checkout@v4  
        with:  
          persist-credentials: false  

      - name: Set Up Python  
        uses: actions/setup-python@v5  
        with:  
          python-version: "3.x"  

      - name: Install Dependencies  
        run: |  
          python -m pip install --upgrade pip  
          pip install requests  

      - name: Generate fonts.json  
        run: python generate_json.py  

      - name: Commit and Push Changes  
        run: |  
          git config --global user.name "GitHub Actions"  
          git config --global user.email "actions@github.com"  
          git add fonts.json Preview.md  
          git commit -m "Auto-update fonts.json and README.md with PNG paths" || echo "No changes to commit"  
          git push https://x-access-token:${{ secrets.FONT }}@github.com/${{ github.repository }}.git HEAD:Master || echo "No changes to push"  
        env:  
          FONT: ${{ secrets.FONT }}
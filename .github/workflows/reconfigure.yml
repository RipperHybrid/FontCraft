name: Reconfigure Fonts & Preview

on:
  push:
    branches:
      - Master
    paths-ignore:
      - "fonts.json"
      - "Preview.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate Metadata (JSON + MD)
        shell: python
        env:
          GIT_REPO: ${{ github.repository }}
          GIT_REF: ${{ github.ref_name }}
        run: |
          import os
          import json
          from urllib.parse import quote

          repo = os.environ.get("GIT_REPO")
          branch = os.environ.get("GIT_REF")
          base_url = f"https://raw.githubusercontent.com/{repo}/{branch}"

          repo_dir = os.getcwd()
          output_json = os.path.join(repo_dir, "fonts.json")
          output_md = os.path.join(repo_dir, "Preview.md")

          data = {}
          md_content = "## Emojis and Fonts Preview\n\n"

          allowed_extensions = {".ttf", ".otf"}
          categories = ["Emoji", "Fonts"]

          print(f"Scanning {repo} on branch {branch}...")

          for category in sorted(categories):
              category_path = os.path.join(repo_dir, category)

              if not os.path.isdir(category_path):
                  continue

              data[category] = {}

              for folder in sorted(os.listdir(category_path), key=str.lower):
                  folder_path = os.path.join(category_path, folder)

                  if os.path.isdir(folder_path):

                      scan_fonts = [
                          f for f in sorted(os.listdir(folder_path), key=str.lower)
                          if os.path.isfile(os.path.join(folder_path, f)) and f.endswith(tuple(allowed_extensions))
                      ]

                      files_list = []
                      for f in scan_fonts:
                          file_path = os.path.join(folder_path, f)
                          file_size = os.path.getsize(file_path) # Gets the file size in bytes
                          raw_url = f"{base_url}/{quote(f'{category}/{folder}/{f}')}"

                          files_list.append({
                              "filename": f,
                              "download_url": raw_url,
                              "size_bytes": file_size
                          })

                      scan_imgs = [
                          f for f in sorted(os.listdir(folder_path), key=str.lower)
                          if os.path.isfile(os.path.join(folder_path, f)) and f.endswith(".png")
                      ]

                      preview_url = None
                      if scan_imgs:
                          preview_url = f"{base_url}/{quote(f'{category}/{folder}/{scan_imgs[0]}')}"

                          md_content += f"### {folder}\n"
                          for img in scan_imgs:
                              img_url = f"{base_url}/{quote(f'{category}/{folder}/{img}')}"
                              md_content += f'- <img src="{img_url}" width="200px" alt="{folder}">\n'
                          md_content += "\n"

                      if files_list:
                          data[category][folder] = {
                              "preview": preview_url,
                              "files": files_list
                          }

          with open(output_json, "w") as json_file:
              json.dump(data, json_file, indent=2)

          with open(output_md, "w") as md_file:
              md_file.write(md_content)

          print("fonts.json and Preview.md generated successfully.")

      - name: Commit and Push to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add fonts.json Preview.md

          git commit -m "Auto-update Font metadata & Preview [skip ci]" || echo "No changes to commit"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }} || echo "No changes to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GitLab (Safe Sync)
        env:
          TARGET_REPO: "gitlab.com/RipperHybrid/FontCraft.git"
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@${{ env.TARGET_REPO }}
          # Removed --force to bypass GitLab's protected branch error.
          git push gitlab HEAD:${{ github.ref_name }}
          git push gitlab --tags

  release:
    needs: update-json
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Metadata from module.prop
        id: metadata
        run: |
          RAW_VERSION=$(grep -oP '^version=\K.*' module.prop | tr -d '\r')

          VERSION=${RAW_VERSION#v}

          COMMIT_MSG=$(git log -1 --pretty=%B)

          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "filename=FontCraftPro_V${VERSION}_By_RipperHybrid.zip" >> $GITHUB_OUTPUT

          if [ -f "changelog.md" ]; then
            echo "body_file=changelog.md" >> $GITHUB_OUTPUT
          else
            echo "$COMMIT_MSG" > release_msg.txt
            echo "body_file=release_msg.txt" >> $GITHUB_OUTPUT
          fi

      - name: Create Release Zip
        run: |
          zip -r ${{ steps.metadata.outputs.filename }} \
          binaries \
          META-INF \
          Template \
          webroot \
          action.sh \
          customize.sh \
          utils.sh \
          module.prop \
          service.sh

      - name: Check for Edit and Append Footer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.metadata.outputs.tag }}"
          BODY_FILE="${{ steps.metadata.outputs.body_file }}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG exists. Appending edited footer."

            NOW_DATE=$(date +'%Y-%m-%d')
            NOW_TIME=$(date +'%H:%M:%S')

            echo "" >> "$BODY_FILE"
            echo "- Edited: Date: $NOW_DATE Time: $NOW_TIME" >> "$BODY_FILE"
          else
            echo "New release. No footer added."
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: FontCraft Pro Module - Version ${{ steps.metadata.outputs.version }} Changelog
          body_path: ${{ steps.metadata.outputs.body_file }}
          files: ${{ steps.metadata.outputs.filename }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send to Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.BOTAPI }}
          CHAT_ID: ${{ secrets.CHANNEL }}
          ZIP_NAME: ${{ steps.metadata.outputs.filename }}
          BODY_FILE: ${{ steps.metadata.outputs.body_file }}
          REPO_SLUG: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_HASH: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Secrets missing. Skipping Telegram upload."
            exit 0
          fi

          if [ ! -f "$ZIP_NAME" ]; then
            echo "File $ZIP_NAME not found."
            exit 1
          fi

          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            BTN_TEXT="Manual Run ⚡️"
            BTN_URL="${SERVER_URL}/${REPO_SLUG}/actions/runs/${RUN_ID}"
          else
            BTN_TEXT="View Commit 📝"
            BTN_URL="${SERVER_URL}/${REPO_SLUG}/commit/${COMMIT_HASH}"
          fi

          REPO_URL="${SERVER_URL}/${REPO_SLUG}"
          KEYBOARD_JSON="{\"inline_keyboard\":[[{\"text\":\"$BTN_TEXT\",\"url\":\"$BTN_URL\"},{\"text\":\"Repo 🏠\",\"url\":\"$REPO_URL\"}]]}"

          CAPTION=$(cat "$BODY_FILE")

          if [ ${#CAPTION} -ge 1024 ]; then
            CAPTION="${CAPTION:0:950}

          ... (Changelog truncated due to Telegram limit)"
          fi

          curl -v -F "chat_id=$CHAT_ID" \
               -F "document=@$ZIP_NAME" \
               -F "caption=$CAPTION" \
               -F "parse_mode=Markdown" \
               -F "reply_markup=$KEYBOARD_JSON" \
               "https://api.telegram.org/bot$BOT_TOKEN/sendDocument"
